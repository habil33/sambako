<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<title>Kasir Sembako</title>

<style>
body {
  font-family: Arial, sans-serif;
  background: #0f172a;
  color: white;
  text-align: center;
}

.container {
  width: 350px;
  margin: auto;
  background: #1e293b;
  padding: 20px;
  border-radius: 20px;
  box-shadow: 0 0 20px #000;
}

h1 {
  color: #38bdf8;
}

select, input {
  width: 90%;
  padding: 10px;
  margin: 10px;
  border-radius: 10px;
  border: none;
}

button {
  padding: 10px 20px;
  border-radius: 10px;
  border: none;
  background: #22c55e;
  color: white;
  cursor: pointer;
}

button:hover {
  background: #16a34a;
}

.list {
  text-align: left;
  margin-top: 20px;
}

.item {
  background: #334155;
  padding: 10px;
  margin: 5px;
  border-radius: 10px;
  display: flex;
  justify-content: space-between;
}

.total {
  margin-top: 20px;
  font-size: 20px;
  color: #facc15;
}
</style>
</head>

<body>

<div class="container">
<h1>Kasir Sembako</h1>

<select id="barang" onchange="updateHarga()">
  <option value="">-- Pilih Barang --</option>
  <option value="3000">Indomie</option>
  <option value="3200">Supermie</option>
  <option value="5000">Popmie</option>
  <option value="13000">Beras (1kg)</option>
  <option value="1500">Masako</option>
  <option value="2000">Ladaku</option>
  <option value="3500">Milo Sachet</option>
</select>

<input type="number" id="harga" placeholder="Harga" readonly>
<input type="number" id="jumlah" placeholder="Jumlah">

<button onclick="tambah()">Tambah</button>

<div class="list" id="list"></div>

<div class="total">
Total: Rp <span id="total">0</span>
</div>
</div>

<script>
let total = 0;

function updateHarga(){
  let barang = document.getElementById("barang");
  let harga = barang.value;
  document.getElementById("harga").value = harga;
}

function tambah(){
  let barang = document.getElementById("barang");
  let nama = barang.options[barang.selectedIndex].text;
  let harga = parseInt(document.getElementById("harga").value);
  let jumlah = parseInt(document.getElementById("jumlah").value);

  if(!nama || !harga || !jumlah){
    alert("Isi semua dulu!");
    return;
  }

  let subtotal = harga * jumlah;
  total += subtotal;

  document.getElementById("total").innerText = total;

  let div = document.createElement("div");
  div.className = "item";

  div.innerHTML = `
    ${nama} x${jumlah} = Rp ${subtotal}
    <button onclick="hapus(this, ${subtotal})" style="background:red;">X</button>
  `;

  document.getElementById("list").appendChild(div);
}

function hapus(btn, subtotal){
  total -= subtotal;
  document.getElementById("total").innerText = total;
  btn.parentElement.remove();
}
</script>

</body>
</html>
